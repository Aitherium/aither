# AitherADK Hardware Profile: AMD ROCm GPU
# For AMD GPUs with ROCm support (RX 7900 XTX, MI250, etc.)

name: amd
description: AMD GPU with ROCm — mid-to-large models via ROCm backend

gpu:
  vendor: amd

models:
  default: "llama3.1:8b"
  small: "llama3.2:3b"
  large: "llama3.1:8b"
  embedding: "nomic-embed-text"

recommended_models:
  - "llama3.2:3b"
  - "llama3.1:8b"
  - "nomic-embed-text"
  - "deepseek-r1:8b"

limits:
  max_context: 16384
  max_concurrent: 1

notes: >
  AMD ROCm profile. Ollama supports ROCm for compatible GPUs.
  Performance varies by card — RX 7900 XTX performs well,
  older cards may need smaller models.
