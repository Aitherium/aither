# GitHub Actions workflow for building and releasing AitherADK
# Copy to .github/workflows/release-adk.yml to activate
#
# Triggers on tag push: v0.9.0, v1.0.0, etc.
# Builds:
#   - PyPI package (pip install aither-adk)
#   - Standalone executables (Windows, macOS, Linux)
#   - npm package (npm install -g aither-adk)
#   - Homebrew formula update
#   - winget manifest update

name: Release AitherADK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.9.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  # ── PyPI Package ─────────────────────────────────────────────
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and publish to PyPI
        working-directory: aither-adk
        run: |
          pip install build twine
          python -m build
          twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── Standalone Executables ───────────────────────────────────
  executables:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: aither-linux-x64
          - os: macos-latest
            artifact: aither-macos-universal
          - os: windows-latest
            artifact: aither-win64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: aither-adk
        run: |
          pip install -e .
          pip install pyinstaller
      - name: Build executable
        working-directory: aither-adk
        run: python packaging/build_executable.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: aither-adk/dist/aither*

  # ── npm Package ──────────────────────────────────────────────
  npm:
    runs-on: ubuntu-latest
    needs: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        working-directory: aither-adk/packaging/npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Release ───────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [pypi, executables]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # Python (recommended)
            pip install aither-adk

            # One-liner
            curl -fsSL https://aitherium.com/install.sh | sh

            # Windows
            irm https://aitherium.com/install.ps1 | iex

            # npm
            npm install -g aither-adk

            # Homebrew
            brew install aither-adk
            ```

            ## Quick Start

            ```bash
            aither register           # Create free account
            aither init my-agent      # Scaffold project
            cd my-agent && aither run # Start your agent
            ```
