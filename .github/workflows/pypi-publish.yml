name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish-adk:
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: aither-adk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build aither-adk
        run: python -m build
      - name: Publish aither-adk to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: aither-adk/dist/

  publish-sdk:
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: aithersdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build aithersdk
        run: python -m build
      - name: Publish aithersdk to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: aithersdk/dist/
