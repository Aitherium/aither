# AitherOS ADK - Alpha Docker Compose
# Minimal setup for running the ADK server with optional local vLLM.
#
# Quick start:
#   1. Copy .env.example to .env and fill in your keys
#   2. docker compose -f docker-compose.alpha.yml up -d
#
# For GPU users who want local vLLM instead of Ollama:
#   docker compose -f docker-compose.alpha.yml --profile gpu up -d

services:
  # ---------------------------------------------------------------------------
  # ADK Server
  # ---------------------------------------------------------------------------
  # The main agent server. Exposes an OpenAI-compatible API on port 8080.
  # By default it talks to a local Ollama instance running on the host via
  # host.docker.internal. Switch AITHER_LLM_BACKEND to "openai" or
  # "anthropic" to use cloud providers instead.
  # ---------------------------------------------------------------------------
  adk-server:
    build:
      context: ../aither-adk
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AITHER_LLM_BACKEND=${AITHER_LLM_BACKEND:-ollama}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - AITHER_MODEL=${AITHER_MODEL:-}
      - AITHER_GATEWAY_URL=${AITHER_GATEWAY_URL:-https://gateway.aitherium.com}
      - AITHER_API_KEY=${AITHER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # vLLM Primary (optional - GPU users only)
  # ---------------------------------------------------------------------------
  # Local vLLM inference server. Activate with: --profile gpu
  # Requires an NVIDIA GPU with sufficient VRAM for your chosen model.
  # The ADK server will connect to this automatically when
  # AITHER_LLM_BACKEND=vllm and OLLAMA_HOST=http://vllm-primary:8000.
  # ---------------------------------------------------------------------------
  vllm-primary:
    image: vllm/vllm-openai:latest
    profiles:
      - gpu
    ports:
      - "8120:8000"
    environment:
      - MODEL=${VLLM_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
    volumes:
      - vllm-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  vllm-cache:
    driver: local
