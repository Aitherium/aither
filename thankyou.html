<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks — AitherOS Alpha</title>
    <style>
        :root { --bg: #0a0a0f; --accent2: #a78bfa; --text: #e2e8f0; --muted: #94a3b8; --success: #34d399; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
        }
        .container { max-width: 500px; }
        .check { font-size: 4rem; margin-bottom: 1.5rem; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
        a {
            display: inline-block; padding: 0.7rem 1.5rem; border-radius: 8px;
            background: #7c3aed; color: white; text-decoration: none; font-weight: 600;
        }
        a:hover { background: #6d28d9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="check">&#x2705;</div>
        <h1>You're on the list!</h1>
        <p>We've received your alpha access request. You'll get an email with setup instructions and your invite shortly.</p>
        <p>In the meantime, star the repo to stay updated on releases.</p>
        <a href="https://github.com/Aitherium/AitherOS-Alpha">Back to GitHub</a>
    </div>
</body>
</html>
